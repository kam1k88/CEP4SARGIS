name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git ${{ env.VCPKG_ROOT }}

      - name: Bootstrap vcpkg
        run: ${{ env.VCPKG_ROOT }}\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: |
          ${{ env.VCPKG_ROOT }}\vcpkg install ceres:x64-windows eigen3:x64-windows
          ${{ env.VCPKG_ROOT }}\vcpkg install qt6-base:x64-windows qt6-charts:x64-windows qt6-tools:x64-windows
        env:
          VCPKG_BINARY_SOURCES: clear;nuget,GitHub,readwrite

      - name: Configure
        run: |
          New-Item -ItemType Directory -Force -Path build
          Push-Location build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" `
            ..
          Pop-Location

      - name: Build
        run: cmake --build build --config Release

      - name: Create package
        run: |
          New-Item -ItemType Directory -Force -Path CurveFitScientificApp-win64
          Copy-Item build\Release\CurveFitScientificApp.exe CurveFitScientificApp-win64\
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination CurveFitScientificApp-win64\
          $windeployqt = Get-ChildItem -Path ${{ env.VCPKG_ROOT }} -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($windeployqt) { & $windeployqt.FullName CurveFitScientificApp-win64\CurveFitScientificApp.exe --release }
          if (Test-Path build\Release\plugins) { Copy-Item -Recurse build\Release\plugins CurveFitScientificApp-win64\ }
          Compress-Archive -Path CurveFitScientificApp-win64 -DestinationPath CurveFitScientificApp-win64.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: win64
          path: CurveFitScientificApp-win64.zip

  build-macos:
    name: Build macOS ARM64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          mkdir -p "$RUNNER_TEMP/certs"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certs/cert.p12"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$RUNNER_TEMP/certs/cert.p12" -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build
        run: |
          brew install cmake ninja eigen ceres-solver qt@6
          chmod +x build_mac.sh sign_mac.sh notarize_mac.sh package_mac.sh
          ./build_mac.sh

      - name: Package, Sign & Notarize
        env:
          DEVELOPER_ID_CERT: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: ./package_mac.sh install/CurveFitScientificApp.app --sign --notarize

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/notarized/

  publish-release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: win64
          path: artifacts/win64

      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win64/CurveFitScientificApp-win64.zip
            artifacts/macos/CurveFitScientificApp.dmg
            artifacts/macos/CurveFitScientificApp.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
