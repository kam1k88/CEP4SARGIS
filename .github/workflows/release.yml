name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Cache vcpkg (ускоряет сборку в 10 раз)
      # -----------------------------
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/buildtrees
            ${{ env.VCPKG_ROOT }}/packages
          key: vcpkg-${{ runner.os }}-static

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git ${{ env.VCPKG_ROOT }}

      - name: Bootstrap vcpkg
        run: ${{ env.VCPKG_ROOT }}\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: |
          ${{ env.VCPKG_ROOT }}\vcpkg install ceres:x64-windows eigen3:x64-windows
        env:
          VCPKG_BINARY_SOURCES: clear;nuget,GitHub,readwrite

      # -----------------------------
      # Install Qt (официальный способ)
      # -----------------------------
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      # -----------------------------
      # Configure CMake
      # -----------------------------
      - name: Configure
        run: |
          New-Item -ItemType Directory -Force -Path build
          Push-Location build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" `
            ..
          Pop-Location

      - name: Build
        run: cmake --build build --config Release

      # -----------------------------
      # Create portable ZIP + NSIS installer
      # -----------------------------
      - name: Create package
        run: |
          $version = "${{ github.ref_name }}"
          $version = $version.TrimStart("v")

          # Папка portable
          New-Item -ItemType Directory -Force -Path SargisLabScientificApp-$version-win64
          Copy-Item build\Release\SargisLabScientificApp.exe SargisLabScientificApp-$version-win64\
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination SargisLabScientificApp-$version-win64\

          # windeployqt
          $windeployqt = Get-Command windeployqt.exe -ErrorAction SilentlyContinue
          if ($windeployqt) { & $windeployqt.Source SargisLabScientificApp-$version-win64\SargisLabScientificApp.exe --release }

          # ZIP
          Compress-Archive -Path SargisLabScientificApp-$version-win64 -DestinationPath SargisLabScientificApp-$version-win64.zip

          # -----------------------------
          # NSIS installer
          # -----------------------------
          choco install nsis -y
          makensis /DVERSION=$version installer.nsi

        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: win64
          path: |
            SargisLabScientificApp-*-win64.zip
            SargisLabScientificApp-*-Setup.exe

  publish-release:
    name: Publish Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: win64
          path: artifacts/win64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/win64/*.zip
            artifacts/win64/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
