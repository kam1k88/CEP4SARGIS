name: Windows Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git ${{ env.VCPKG_ROOT }}

      - name: Bootstrap vcpkg
        run: $env:VCPKG_ROOT\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: |
          $env:VCPKG_ROOT\vcpkg install ceres:x64-windows eigen3:x64-windows
          $env:VCPKG_ROOT\vcpkg install qt6-base:x64-windows qt6-charts:x64-windows qt6-tools:x64-windows
        env:
          VCPKG_BINARY_SOURCES: clear;nuget,GitHub,readwrite

      - name: Configure
        run: |
          New-Item -ItemType Directory -Force -Path build
          Push-Location build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            ..
          Pop-Location

      - name: Build
        run: cmake --build build --config Release

      - name: Create package directory
        run: |
          New-Item -ItemType Directory -Force -Path CurveFitScientificApp-win64
          Copy-Item build\Release\CurveFitScientificApp.exe CurveFitScientificApp-win64\
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination CurveFitScientificApp-win64\
        shell: pwsh

      - name: Run windeployqt
        run: |
          $vcpkg = "${{ github.workspace }}/vcpkg"
          $windeployqt = Get-ChildItem -Path $vcpkg -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($windeployqt) {
            & $windeployqt.FullName CurveFitScientificApp-win64\CurveFitScientificApp.exe --release
          } else {
            Write-Warning "windeployqt not found"
          }
        shell: pwsh

      - name: Copy plugins
        run: |
          if (Test-Path build\Release\plugins) {
            Copy-Item -Recurse build\Release\plugins CurveFitScientificApp-win64\
          }
        shell: pwsh

      - name: Create zip
        run: Compress-Archive -Path CurveFitScientificApp-win64 -DestinationPath CurveFitScientificApp-win64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CurveFitScientificApp-win64
          path: CurveFitScientificApp-win64.zip
