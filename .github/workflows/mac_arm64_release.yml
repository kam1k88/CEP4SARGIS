name: macOS ARM64 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: macos-14  # ARM64 runner (M1)
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake ninja eigen ceres-solver qt@6

      - name: Build
        run: |
          chmod +x build_mac.sh
          ./build_mac.sh

      - name: Package DMG
        run: |
          chmod +x package_mac.sh
          ./package_mac.sh install/CurveFitScientificApp.app

      - name: Create zip for release
        run: |
          cd install && zip -r ../dist/CurveFitScientificApp-macOS-ARM64.zip CurveFitScientificApp.app && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CurveFitScientificApp-macOS-ARM64
          path: |
            install/CurveFitScientificApp.app
            dist/CurveFitScientificApp.dmg
            dist/CurveFitScientificApp-macOS-ARM64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CurveFitScientificApp.dmg
            dist/CurveFitScientificApp-macOS-ARM64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
